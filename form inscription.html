<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Soin</title>
    <link rel="stylesheet" href="form inscriptions.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="registration-container">
        <!-- LE logo -->
        <a class="logo" href="index.html"><span class="Omni">Omni<span class="Soin">Soin</span>
            </a>
        <div class="registration-card">
            <h2>Inscription</h2>
            <form id="proForm">
                <!-- Ligne 1: Nom / Contact / Prénom -->
                <div class="row-triple">
                    <div class="input-group">
                        <label>Nom</label>
                        <input type="text" name="nom">
                    </div>
                    <div class="input-group">
                        <label>Contact</label>
                        <input type="text" name="contact">
                    </div>
                    <div class="input-group">
                        <label>Prenom</label>
                        <input type="text" name="prenom">
                    </div>
                </div>
                <!-- Etablissement -->
                <div class="input-group full-width">
                    <label>Etablissement frequenté pour les etudes de medcin</label>
                    <input type="text" name="etablissement">
                </div>
                <!-- Spécialité / Année -->
                <div class="row-double">
                    <div class="input-group">
                        <label>Spécialité</label>
                        <input type="text" name="specialite">
                    </div>
                    <div class="input-group">
                        <label>Anné d' obtention du diplome</label>
                        <input type="text" name="annee_diplome">
                    </div>
                </div>
                <!-- Zones d'Upload (Diplômes, CNI, CMU) -->
                <div class="upload-section">
                    <label>Diplomes de medcine</label>
                    <div class="drop-zone">
                        <i class="fa-solid fa-folder-open"></i>
                        <p>Déposez vos diplomes de medcine</p>
                        <span>Format accepté: PDF | Taille max: 10Mo</span>
                        <input type="file" hidden accept=".pdf">
                    </div>
                </div>
                <div class="upload-section">
                    <label>CNI (Carte Nationales D' identité)</label>
                    <div class="drop-zone">
                        <i class="fa-solid fa-folder-open"></i>
                        <p>Déposez votre CNI</p>
                        <span>Format accepté: PDF | Taille max: 10Mo</span>
                        <input type="file" hidden accept=".pdf">
                    </div>
                </div>
                <div class="upload-section">
                    <label>CMU (Carte de Maladies Universelles)</label>
                    <div class="drop-zone">
                        <i class="fa-solid fa-folder-open"></i>
                        <p>Déposez votre CMU</p>
                        <span>Format accepté: PDF | Taille max: 10Mo</span>
                        <input type="file" hidden accept=".pdf">
                    </div>
                </div>
                <!-- Identifiants -->
                <div class="row-double">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>
                    <div class="input-group">
                        <label>Mots de passse</label>
                        <input type="password" name="password">
                    </div>
                </div>
                <button type="submit" class="submit-btn">Soumettre</button>
            </form>
        </div>
    </div>
    <script src="form inscription.js"></script>
</body>

</html>
