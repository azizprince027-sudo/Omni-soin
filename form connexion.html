<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form connexion.css">
</head>

<body>
    <form class="search-container">
        <form class="search-bar-form">
            <div class="input-wrapper">
                <div class="field">
                    <input type="text" placeholder="Spécialité" list="specs">
                    <datalist id="specs">
                <option value="Cardiologue">
                <option value="Dentiste">
                <option value="Généraliste">
            </datalist>
                </div>

                <div class="line-divider"></div>

                <div class="field">
                    <input type="text" placeholder="Ville (ex: Abidjan)">
                </div>

                <div class="line-divider"></div>

                <div class="field">
                    <select>
                <option value="" disabled selected>Disponibilité</option>
                <option value="now">Maintenant</option>
                <option value="today">Aujourd'hui</option>
                <option value="week">Cette semaine</option>
            </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">rechercher</button>
        </form>
    </form>
</body>

</html>
