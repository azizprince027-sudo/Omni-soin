<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Soin</title>
    <link rel="stylesheet" href="form connexion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
    <div class="login-container">
        <header class="login-header">
            <!-- LE logo -->
            <a class="logo" href="index.html"><span class="Omni">Omni<span class="Soin">Soin</span>
            </a>
        </header>

        <div class="login-card">
            <h2>Connexion</h2>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Mots de passse</label>
                    <input type="password" id="password" required>
                </div>

                <a href="mots de passe oublié.html" class="forgot-link">Mots de passe oublié?</a>

                <button type="submit" class="btn btn-login">Connexion</button>

                <button type="button" class="btn btn-google">
                <i class="fa-brands fa-google"></i> Connexion avec google
            </button>
            </form>

            <a href="./form inscription.html" class="signup-link">S' inscrire en tant que medcin</a>
        </div>
    </div>
    <script src="form connexion.js"></script>
</body>

</html>
